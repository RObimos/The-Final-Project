services:
  app:
    build: .
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${PGUSER:-pronos}:${PGPASSWORD:-pronos}@db:5432/${PGDATABASE:-pronos}
      SESSION_SECRET: ${SESSION_SECRET:-change-me-en-production}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin1234}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@pronos.local}
      NODE_ENV: production
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PGUSER:-pronos}
      POSTGRES_PASSWORD: ${PGPASSWORD:-pronos}
      POSTGRES_DB: ${PGDATABASE:-pronos}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER:-pronos}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
